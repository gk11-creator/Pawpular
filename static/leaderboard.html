<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paw<span>dium</span> — Top Pets</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/style.css"/>
  <style>
    .lb-layout{
      max-width:900px;margin:0 auto;
      padding:20px 16px 80px;
      display:grid;grid-template-columns:1fr 320px;gap:20px;
    }
    .rank-row.normal{background:#faf8f5}
    .badge-tag{
      display:inline-block;
      background:linear-gradient(135deg,#FFD700,#FFA500);
      color:#7a5500;border-radius:20px;
      padding:1px 8px;font-size:10px;font-weight:800;
      margin-top:2px;margin-left:4px;
    }
    .viral-tag{
      display:inline-block;
      background:linear-gradient(135deg,#ff6b35,#ff4500);
      color:#fff;border-radius:20px;
      padding:1px 8px;font-size:10px;font-weight:800;
      margin-top:2px;margin-left:4px;
    }
    .bonus-tag{
      display:inline-block;
      background:linear-gradient(135deg,#00c896,#00a87a);
      color:#fff;border-radius:20px;
      padding:1px 8px;font-size:10px;font-weight:800;
      margin-top:2px;margin-left:4px;
    }
    .score-breakdown{font-size:10px;color:var(--muted);margin-top:2px}

    .side-card{
      background:#fff;border:1.5px solid var(--border);
      border-radius:16px;padding:16px;margin-bottom:16px;
    }
    .side-card-title{
      font-size:13px;font-weight:900;margin-bottom:12px;
      display:flex;align-items:center;justify-content:space-between;
    }
    .reset-badge{
      background:#f0fdf4;color:#166534;border-radius:20px;
      padding:3px 10px;font-size:10px;font-weight:700;font-family:monospace;
    }

    .mission-item{
      display:flex;align-items:center;gap:10px;
      padding:9px 0;border-bottom:1px solid var(--border);
    }
    .mission-item:last-child{border-bottom:none}
    .mission-icon{font-size:20px;flex-shrink:0}
    .mission-info{flex:1}
    .mission-title{font-size:12px;font-weight:800}
    .mission-desc{font-size:10px;color:var(--muted);margin-top:1px}
    .mission-bonus{font-size:11px;font-weight:900;color:#00c896;flex-shrink:0}
    .mission-done{font-size:18px;flex-shrink:0}
    .mission-item.completed{opacity:.6}
    .mission-item.completed .mission-title{text-decoration:line-through}

    /* HOT PETS — 3 큰 카드 */
    .hot-grid{
      display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;
    }
    .hot-card{
      border-radius:12px;overflow:hidden;
      border:1.5px solid var(--border);
      cursor:pointer;transition:transform .15s;
      text-align:center;
    }
    .hot-card:hover{transform:translateY(-3px)}
    .hot-card.rank1{border-color:#FFD700;border-width:2px}
    .hot-card.rank2{border-color:#C0C0C0;border-width:2px}
    .hot-card.rank3{border-color:#CD7F32;border-width:2px}
    .hot-card-img{
      width:100%;aspect-ratio:1/1;
      object-fit:cover;display:block;
    }
    .hot-card-avatar{
      width:100%;aspect-ratio:1/1;
      display:flex;align-items:center;justify-content:center;
      font-size:36px;background:var(--bg);
    }
    .hot-card-body{padding:8px 6px}
    .hot-card-medal{font-size:16px}
    .hot-card-name{
      font-size:11px;font-weight:800;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      margin-top:2px;
    }
    .hot-card-score{
      font-size:10px;font-weight:900;color:#ff6b35;margin-top:2px;
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">Paw<span>dium</span></div>
  <div style="font-size:13px;font-weight:700;color:rgba(255,255,255,.8)" id="nav-user"></div>
</nav>

<div class="lb-layout">

  <!-- LEFT: MAIN LEADERBOARD -->
  <div class="lb-main">
    <div class="banner">
      <div class="banner-label">Monthly Rankings · April 2026</div>
      <div class="banner-title">🏆 Top Pets Leaderboard</div>
      <div class="banner-row">
        <div class="banner-pill"><span class="live-dot"></span>Live</div>
        <div class="banner-pill" id="entry-count">— entries</div>
        <div class="banner-pill">Resets May 1</div>
      </div>
    </div>
    <div class="board-header">
      <div>Rank</div>
      <div>Pet</div>
      <div style="text-align:right">Score</div>
    </div>
    <div id="rank-list"><div class="loading">Loading rankings...</div></div>
  </div>

  <!-- RIGHT: SIDEBAR -->
  <div class="lb-side">

    <!-- MISSIONS -->
    <div class="side-card">
      <div class="side-card-title">
        🎯 Daily Missions
        <span class="reset-badge">Resets at midnight</span>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px">
        Complete missions to earn bonus points!
      </div>
      <div id="mission-list"><div class="loading">Loading...</div></div>
    </div>

    <!-- HOT RIGHT NOW — Top 3 only, big cards -->
    <div class="side-card">
      <div class="side-card-title">
        🔥 Today's Hot Pets
        <span class="reset-badge" id="hot-timer">00:00:00</span>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:12px">
        Most viral in the last 24 hours
      </div>
      <div id="hot-list">
        <div style="text-align:center;padding:16px;color:var(--muted);font-size:12px">
          No viral activity yet 🔥
        </div>
      </div>
    </div>

  </div>

</div>

<div class="bottom-nav">
  <button class="bottom-btn" onclick="location.href='/feed'">
    <span class="bottom-icon">🏠</span>Feed
  </button>
  <button class="bottom-btn active" onclick="location.href='/leaderboard'">
    <span class="bottom-icon">🏆</span>Ranking
  </button>
  <button class="bottom-btn" onclick="location.href='/post'">
    <span class="bottom-icon">➕</span>Post
  </button>
  <button class="bottom-btn" onclick="location.href='/profile'">
    <span class="bottom-icon">👤</span>Profile
  </button>
</div>

<div class="toast" id="toast-el"></div>

<script>
const ME = localStorage.getItem('pawrank_user');
if (!ME) {
  window.location.href = '/';
} else {
  fetch(`/profile/${ME}`)
    .then(res => {
      if (!res.ok) { localStorage.clear(); window.location.href = '/'; }
    })
    .catch(() => { localStorage.clear(); window.location.href = '/'; });
}

document.getElementById('nav-user').textContent = '@' + ME;

const PET_EMOJI = {
  Dog:'🐕', Cat:'🐈', Fish:'🐟', Bird:'🐦', Rabbit:'🐰',
  'Guinea Pig':'🐹', Hamster:'🐹', Reptile:'🦎',
  Snake:'🐍', Horse:'🐴', Other:'🐾'
};
const MEDALS    = ['🥇','🥈','🥉'];
const PAGE_SIZE = 20;

let allEntries = [];
let shownCount = PAGE_SIZE;

function toast(msg) {
  const el = document.getElementById('toast-el');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function getNextMidnight() {
  const now = new Date();
  return new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0, 0).getTime();
}
let hotResetAt = getNextMidnight();

function tickCountdown() {
  const rem = hotResetAt - Date.now();
  if (rem <= 0) hotResetAt = getNextMidnight();
  const h = Math.floor(rem / 3600000);
  const m = Math.floor((rem % 3600000) / 60000);
  const s = Math.floor((rem % 60000) / 1000);
  const el = document.getElementById('hot-timer');
  if (el) el.textContent =
    `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

async function loadLeaderboard() {
  const res  = await fetch('/api/leaderboard?limit=200');
  const data = await res.json();
  allEntries = data.leaderboard || [];
  const countEl = document.getElementById('entry-count');
  if (countEl) countEl.textContent = data.total_entries + ' entries';
  renderRankList();
  renderHotList();
}

function renderRankList() {
  const el      = document.getElementById('rank-list');
  const visible = allEntries.slice(0, shownCount);

  if (!visible.length) {
    el.innerHTML = '<div class="loading">No entries yet! Post your pet 🐾</div>';
    renderLoadMore(false);
    return;
  }

  el.innerHTML = visible.map((e, i) => {
    const cls      = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : 'normal';
    const emoji    = PET_EMOJI[e.pet_type] || '🐾';
    const avatar   = e.pet_image
      ? `<img src="${e.pet_image}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`
      : emoji;
    const badge    = i === 0 ? '🥇 Gold' : i === 1 ? '🥈 Silver' : i === 2 ? '🥉 Bronze' : '';
    const isViral  = e.viral_score > e.total_likes;
    const hasBonus = e.bonus_points > 0;

    return `
      <div class="rank-row ${cls}" style="cursor:pointer"
        onclick="location.href='/profile?u=${e.username}'">
        <div class="rank-num">${MEDALS[i] || (i + 1)}</div>
        <div class="rank-pet">
          <div class="pet-av">${avatar}</div>
          <div>
            <div class="pet-name">${e.pet_name || e.username}</div>
            <div class="pet-owner">@${e.username}</div>
            <div>
              ${e.pet_type ? `<span class="type-tag">${e.pet_type}</span>` : ''}
              ${badge ? `<span class="badge-tag">${badge}</span>` : ''}
              ${isViral ? `<span class="viral-tag">🔥 Viral</span>` : ''}
              ${hasBonus ? `<span class="bonus-tag">+${e.bonus_points} bonus</span>` : ''}
            </div>
            <div class="score-breakdown">
              🐾 ${e.total_likes} likes
              ${isViral ? `· 🔥 ${e.viral_score} viral` : ''}
              ${hasBonus ? `· ⭐ ${e.bonus_points} mission pts` : ''}
            </div>
          </div>
        </div>
        <div class="score-col">
          <div class="score-num">⭐ ${e.total_score}</div>
          <div class="score-lbl">total score</div>
        </div>
      </div>`;
  }).join('');

  renderLoadMore(allEntries.length > shownCount);
}

function renderLoadMore(show) {
  let btn = document.getElementById('load-more-btn');
  if (!btn) {
    btn = document.createElement('div');
    btn.id = 'load-more-btn';
    btn.style.cssText = 'text-align:center;margin-top:16px';
    document.getElementById('rank-list').after(btn);
  }
  btn.innerHTML = show ? `
    <button onclick="loadMore()"
      style="background:#fff;border:1.5px solid var(--border);border-radius:20px;
             padding:10px 28px;font-size:13px;font-weight:800;cursor:pointer;
             font-family:'Nunito',sans-serif;color:var(--muted)">
      Load More ↓
    </button>` : '';
}

function loadMore() {
  shownCount += PAGE_SIZE;
  renderRankList();
}

async function loadMissions() {
  const res  = await fetch(`/missions/${ME}`);
  const data = await res.json();
  const el   = document.getElementById('mission-list');

  if (!data.missions.length) {
    el.innerHTML = '<div style="text-align:center;padding:16px;color:var(--muted);font-size:12px">No missions today</div>';
    return;
  }

  el.innerHTML = data.missions.map(m => `
    <div class="mission-item ${m.completed ? 'completed' : ''}">
      <div class="mission-icon">${m.title.split(' ')[0]}</div>
      <div class="mission-info">
        <div class="mission-title">${m.title.split(' ').slice(1).join(' ')}</div>
        <div class="mission-desc">${m.description}</div>
      </div>
      <div class="mission-bonus">+${m.bonus_points}pts</div>
      <div class="mission-done">${m.completed ? '✅' : '⬜'}</div>
    </div>`).join('');
}

function renderHotList() {
  const el = document.getElementById('hot-list');

  const top3 = allEntries
    .filter(e => e.viral_score > 0)
    .sort((a, b) => b.viral_score - a.viral_score)
    .slice(0, 3);

  if (!top3.length) {
    el.innerHTML = `<div style="text-align:center;padding:16px;color:var(--muted);font-size:12px">
      No viral activity yet 🔥</div>`;
    return;
  }

  const rankClass = ['rank1','rank2','rank3'];
  const medals    = ['🥇','🥈','🥉'];

  el.innerHTML = `<div class="hot-grid">` +
    top3.map((e, i) => {
      const emoji  = PET_EMOJI[e.pet_type] || '🐾';
      const imgEl  = e.pet_image
        ? `<img class="hot-card-img" src="${e.pet_image}" onerror="this.style.display='none'"/>`
        : `<div class="hot-card-avatar">${emoji}</div>`;
      return `
        <div class="hot-card ${rankClass[i]}"
          onclick="location.href='/profile?u=${e.username}'">
          ${imgEl}
          <div class="hot-card-body">
            <div class="hot-card-medal">${medals[i]}</div>
            <div class="hot-card-name">${e.pet_name || e.username}</div>
            <div class="hot-card-score">🔥 ${e.viral_score}</div>
          </div>
        </div>`;
    }).join('') +
  `</div>`;
}

loadLeaderboard();
loadMissions();
setInterval(tickCountdown, 1000);
setInterval(loadLeaderboard, 15000);
setInterval(loadMissions, 30000);
tickCountdown();
</script>
</body>
</html>
