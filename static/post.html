<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paw<span>dium</span> — Share Your Pet</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/style.css"/>
  <style>
    .post-layout{
      max-width:520px;margin:0 auto;padding:20px 16px 80px;
    }

  
    .upload-box{
      width:100%;aspect-ratio:1/1;
      border:2px dashed var(--border);border-radius:16px;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      cursor:pointer;overflow:hidden;position:relative;
      background:#fafaf5;margin-bottom:16px;
      transition:border-color .15s,background .15s;
    }
    .upload-box:hover{border-color:var(--brand2);background:#f5f5f0}
    .upload-icon{font-size:48px;margin-bottom:8px}
    .upload-text{font-size:13px;font-weight:700;color:var(--muted)}
    .upload-sub{font-size:11px;color:var(--muted);margin-top:4px}
    #image-input{display:none}


    .crop-container{
      width:100%;aspect-ratio:1/1;
      position:relative;overflow:hidden;
      background:#000;border-radius:16px;
      margin-bottom:16px;cursor:grab;
    }
    .crop-container:active{cursor:grabbing}
    .crop-img{
      position:absolute;
      transform-origin:top left;
      user-select:none;pointer-events:none;
    }
    .crop-controls{
      display:flex;align-items:center;gap:10px;
      margin-bottom:16px;padding:0 4px;
    }
    .crop-label{font-size:11px;font-weight:800;color:var(--muted);min-width:50px}
    .crop-controls input[type=range]{flex:1}
    .crop-btn{
      background:var(--brand2);color:#fff;border:none;
      border-radius:20px;padding:5px 14px;
      font-size:11px;font-weight:800;cursor:pointer;
      font-family:'Nunito',sans-serif;
    }
    .crop-btn.secondary{background:#fff;color:var(--muted);border:1.5px solid var(--border)}

    .char-count{font-size:11px;color:var(--muted);text-align:right;margin-top:4px}

    .current-theme{
      background:linear-gradient(135deg,var(--brand),var(--brand-dark));
      color:#fff;border-radius:10px;padding:10px 14px;
      font-size:13px;font-weight:800;margin-bottom:16px;
      display:flex;align-items:center;gap:8px;
    }
    .current-theme span{font-size:11px;opacity:.8;font-weight:600}

    .mission-toast{
      position:fixed;top:80px;right:20px;
      background:linear-gradient(135deg,#00c896,#00a87a);
      color:#fff;border-radius:14px;padding:12px 16px;
      font-size:13px;font-weight:800;z-index:999;
      opacity:0;transform:translateX(20px);
      transition:opacity .3s,transform .3s;
      pointer-events:none;max-width:260px;
    }
    .mission-toast.show{opacity:1;transform:translateX(0)}
    .mission-toast-title{font-size:11px;opacity:.85;margin-bottom:2px}
  </style>
</head>
<body>

<nav>
  <div class="logo">Paw<span>dium</span></div>
  <div style="font-size:13px;font-weight:700;color:rgba(255,255,255,.8)" id="nav-user"></div>
</nav>

<div class="post-layout">

  <div class="banner banner-teal">
    <div class="banner-label">Share Your Pet</div>
    <div class="banner-title">📸 Create a Post</div>
  </div>

  <!-- CURRENT THEME -->
  <div class="current-theme">
    🦁 This Month's Theme: <strong>Bravest Pet</strong>
    <span style="margin-left:auto">April 2026</span>
  </div>

  <div class="upload-box" id="upload-box"
    onclick="document.getElementById('image-input').click()">
    <div class="upload-icon">📷</div>
    <div class="upload-text">Tap to upload a photo</div>
    <div class="upload-sub">JPG, PNG, GIF supported</div>
  </div>
  <input type="file" id="image-input" accept="image/*" onchange="onImageSelected(event)"/>


  <div id="crop-section" style="display:none">
    <div class="crop-container" id="crop-container"
      onmousedown="startDrag(event)"
      ontouchstart="startDragTouch(event)">
      <img class="crop-img" id="crop-img" draggable="false"/>
    </div>
    <div class="crop-controls">
      <span class="crop-label">Zoom</span>
      <input type="range" id="zoom-slider" min="1" max="3" step="0.01" value="1"
        oninput="applyTransform()"/>
      <button class="crop-btn secondary" onclick="resetCrop()">Reset</button>
      <button class="crop-btn" onclick="confirmCrop()">Crop ✓</button>
    </div>
  </div>

  <div class="form-card">
    <div class="field">
      <label>Caption <span style="color:var(--muted);font-weight:600">(optional)</span></label>
      <textarea id="f-caption" rows="3"
        style="width:100%;border:1.5px solid var(--border);border-radius:9px;
               padding:9px 13px;font-size:14px;font-family:'Nunito',sans-serif;
               outline:none;resize:none;color:var(--text);background:#fff;
               transition:border-color .15s"
        placeholder="Write something about your pet..."
        maxlength="200"
        oninput="updateCharCount()"
        onfocus="this.style.borderColor='var(--brand2)'"
        onblur="this.style.borderColor='var(--border)'"></textarea>
      <div class="char-count"><span id="char-count">0</span>/200</div>
    </div>

    <div class="field">
      <label>Location <span style="color:var(--muted);font-weight:600">(optional)</span></label>
      <input id="f-location" placeholder="e.g. Bloomington, IN"/>
    </div>

    <div style="font-size:11px;color:var(--muted);margin-bottom:12px">
      📅 Posted as <strong id="post-date"></strong>
    </div>

    <button class="submit-btn" onclick="submitPost()" id="submit-btn">
      Share Post 🚀
    </button>
  </div>

</div>

<div class="bottom-nav">
  <button class="bottom-btn active" onclick="location.href='/feed'">
    <img src="/static/images/home.png" style="width:26px;height:26px;object-fit:contain"/>
    Feed
  </button>
  <button class="bottom-btn" onclick="location.href='/leaderboard'">
    <img src="/static/images/ranking.png" style="width:26px;height:26px;object-fit:contain"/>
    Ranking
  </button>
  <button class="bottom-btn" onclick="location.href='/post'">
    <span class="bottom-icon">➕</span>ADD
  </button>
  <button class="bottom-btn" onclick="location.href='/profile'">
    <img src="/static/images/profile.png" style="width:26px;height:26px;object-fit:contain"/>
    Profile
  </button>
</div>

<div class="toast" id="toast-el"></div>
<div class="mission-toast" id="mission-toast">
  <div class="mission-toast-title">🎯 Mission Complete!</div>
  <div id="mission-toast-body"></div>
</div>

<script>
const ME = localStorage.getItem('pawrank_user');
if (!ME) {
  window.location.href = '/';
} else {
  fetch(`/profile/${ME}`)
    .then(res => {
      if (!res.ok) { localStorage.clear(); window.location.href = '/'; }
    })
    .catch(() => { localStorage.clear(); window.location.href = '/'; });
}

document.getElementById('nav-user').textContent = '@' + ME;
document.getElementById('post-date').textContent = new Date().toLocaleDateString('en-US', {
  year:'numeric', month:'long', day:'numeric'
});

function toast(msg) {
  const el = document.getElementById('toast-el');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function showMissionToast(missions, bonus) {
  if (!missions.length) return;
  const el   = document.getElementById('mission-toast');
  const body = document.getElementById('mission-toast-body');
  body.textContent = missions.join(', ') + ` · +${bonus}pts earned!`;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}

function updateCharCount() {
  document.getElementById('char-count').textContent =
    document.getElementById('f-caption').value.length;
}

// ── CROP SYSTEM ─────────────────────────────────────────────────────────────
let originalFile = null;
let croppedBlob  = null;
let imgNaturalW  = 0;
let imgNaturalH  = 0;
let posX = 0, posY = 0;
let scale = 1;
let dragging = false;
let dragStartX = 0, dragStartY = 0;
let dragStartPosX = 0, dragStartPosY = 0;

function onImageSelected(event) {
  const file = event.target.files[0];
  if (!file) return;
  originalFile = file;
  croppedBlob  = null;

  const url = URL.createObjectURL(file);
  const img  = document.getElementById('crop-img');
  img.onload = () => {
    imgNaturalW = img.naturalWidth;
    imgNaturalH = img.naturalHeight;
    resetCrop();
    document.getElementById('upload-box').style.display = 'none';
    document.getElementById('crop-section').style.display = 'block';
  };
  img.src = url;
}

function resetCrop() {
  const container = document.getElementById('crop-container');
  const cw = container.offsetWidth;
  const minScale = Math.max(cw / imgNaturalW, cw / imgNaturalH);
  scale = minScale;
  posX  = (cw - imgNaturalW * scale) / 2;
  posY  = (cw - imgNaturalH * scale) / 2;
  document.getElementById('zoom-slider').min   = minScale;
  document.getElementById('zoom-slider').value = minScale;
  applyTransform();
}

function applyTransform() {
  scale = parseFloat(document.getElementById('zoom-slider').value);
  clampPosition();
  document.getElementById('crop-img').style.transform =
    `translate(${posX}px, ${posY}px) scale(${scale})`;
  document.getElementById('crop-img').style.transformOrigin = '0 0';
}

function clampPosition() {
  const container = document.getElementById('crop-container');
  const cw = container.offsetWidth;
  const iw = imgNaturalW * scale;
  const ih = imgNaturalH * scale;
  posX = Math.min(0, Math.max(cw - iw, posX));
  posY = Math.min(0, Math.max(cw - ih, posY));
}

function startDrag(e) {
  dragging = true;
  dragStartX    = e.clientX;
  dragStartY    = e.clientY;
  dragStartPosX = posX;
  dragStartPosY = posY;
  window.addEventListener('mousemove', onDrag);
  window.addEventListener('mouseup',   endDrag);
}

function startDragTouch(e) {
  const t = e.touches[0];
  dragging = true;
  dragStartX    = t.clientX;
  dragStartY    = t.clientY;
  dragStartPosX = posX;
  dragStartPosY = posY;
  window.addEventListener('touchmove', onDragTouch, {passive:false});
  window.addEventListener('touchend',  endDrag);
}

function onDrag(e) {
  if (!dragging) return;
  posX = dragStartPosX + (e.clientX - dragStartX);
  posY = dragStartPosY + (e.clientY - dragStartY);
  applyTransform();
}

function onDragTouch(e) {
  e.preventDefault();
  if (!dragging) return;
  const t = e.touches[0];
  posX = dragStartPosX + (t.clientX - dragStartX);
  posY = dragStartPosY + (t.clientY - dragStartY);
  applyTransform();
}

function endDrag() {
  dragging = false;
  window.removeEventListener('mousemove', onDrag);
  window.removeEventListener('mouseup',   endDrag);
  window.removeEventListener('touchmove', onDragTouch);
  window.removeEventListener('touchend',  endDrag);
}

function confirmCrop() {
  const container = document.getElementById('crop-container');
  const cw = container.offsetWidth;
  const canvas = document.createElement('canvas');
  canvas.width  = cw;
  canvas.height = cw;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(
    document.getElementById('crop-img'),
    -posX / scale, -posY / scale,
    cw / scale, cw / scale,
    0, 0, cw, cw
  );
  canvas.toBlob(blob => {
    croppedBlob = blob;
    const url = URL.createObjectURL(blob);
    document.getElementById('crop-section').style.display = 'none';
    const box = document.getElementById('upload-box');
    box.style.display = 'flex';
    box.innerHTML = `
      <img src="${url}" style="width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0"/>
      <div style="position:absolute;bottom:10px;right:10px">
        <button onclick="event.stopPropagation();redoCrop()"
          style="background:rgba(255,255,255,.9);border:none;border-radius:20px;
                 padding:5px 12px;font-size:11px;font-weight:800;cursor:pointer;
                 font-family:'Nunito',sans-serif">
          Edit Crop
        </button>
      </div>`;
    toast('✅ Crop applied!');
  }, 'image/jpeg', 0.9);
}

function redoCrop() {
  document.getElementById('upload-box').style.display = 'none';
  document.getElementById('crop-section').style.display = 'block';
  croppedBlob = null;
}

// ── SUBMIT ───────────────────────────────────────────────────────────────────
async function submitPost() {
  const fileToUpload = croppedBlob || originalFile;
  if (!fileToUpload) { toast('⚠️ Please select a photo first!'); return; }

  const caption  = document.getElementById('f-caption').value.trim();
  const location = document.getElementById('f-location').value.trim();
  const btn      = document.getElementById('submit-btn');

  btn.textContent = 'Uploading...';
  btn.disabled    = true;

  const formData = new FormData();
  formData.append('username', ME);
  formData.append('caption',  caption);
  formData.append('location', location);
  formData.append('image',    fileToUpload, 'post.jpg');

  try {
    const res  = await fetch('/upload', { method:'POST', body: formData });
    const data = await res.json();

    if (res.ok) {
      if (data.missions_completed?.length) {
        showMissionToast(data.missions_completed, data.bonus_points);
        setTimeout(() => window.location.href = '/feed', 2500);
      } else {
        toast('✅ Post shared!');
        setTimeout(() => window.location.href = '/feed', 1000);
      }
    } else {
      toast('❌ ' + (data.detail || 'Upload failed'));
      btn.textContent = 'Share Post 🚀';
      btn.disabled    = false;
    }
  } catch {
    toast('❌ Cannot reach server');
    btn.textContent = 'Share Post 🚀';
    btn.disabled    = false;
  }
}
</script>
</body>
</html>
