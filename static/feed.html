<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paw<span>dium</span> — Community Feed</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/style.css"/>
  <link rel="stylesheet" href="/static/feed.css"/>
  <style>
    .mission-toast{
      position:fixed;top:80px;right:20px;
      background:linear-gradient(135deg,#00c896,#00a87a);
      color:#fff;border-radius:14px;padding:12px 16px;
      font-size:13px;font-weight:800;z-index:999;
      opacity:0;transform:translateX(20px);
      transition:opacity .3s,transform .3s;
      pointer-events:none;max-width:260px;
    }
    .mission-toast.show{opacity:1;transform:translateX(0)}
    .mission-toast-title{font-size:11px;opacity:.85;margin-bottom:2px}
    .post-username{cursor:pointer}
    .post-username:hover{text-decoration:underline}
    .paw-icon{
      width:22px;height:22px;object-fit:contain;
      transition:opacity .15s,filter .15s;
    }
    .paw-icon.off{opacity:.35;filter:grayscale(1)}
    .paw-icon.on{opacity:1;filter:none}
  </style>
</head>
<body>

<nav>
  <div class="logo">Paw<span>dium</span></div>
  <div style="font-size:13px;font-weight:700;color:rgba(255,255,255,.8)" id="nav-user"></div>
</nav>

<div class="feed-layout">

  <div class="theme-bar">
    <div class="theme-bar-left">
      <div class="theme-label">Theme of the Month</div>
      <div class="theme-name">🦁 Bravest Pet</div>
    </div>
    <div class="theme-bar-right" style="margin-top:20px">
        <img src="/static/images/pawdium-logo.png" style="width:100px;height:100px;object-fit:contain"/>
    </div>
  </div>

  <div class="feed-grid" id="feed-list">
    <div class="empty-feed">
      <div class="big">🐾</div>
      <p>Loading posts...</p>
    </div>
  </div>

</div>

<div class="bottom-nav">
  <button class="bottom-btn active" onclick="location.href='/feed'">
    <img src="/static/images/home.png" style="width:26px;height:26px;object-fit:contain"/>
    Feed
  </button>
  <button class="bottom-btn" onclick="location.href='/leaderboard'">
    <img src="/static/images/ranking.png" style="width:26px;height:26px;object-fit:contain"/>
    Ranking
  </button>
  <button class="bottom-btn" onclick="location.href='/post'">
    <span class="bottom-icon">➕</span>ADD
  </button>
  <button class="bottom-btn" onclick="location.href='/profile'">
    <img src="/static/images/profile.png" style="width:26px;height:26px;object-fit:contain"/>
    Profile
  </button>
</div>

<div class="toast" id="toast-el"></div>
<div class="mission-toast" id="mission-toast">
  <div class="mission-toast-title">🎯 Mission Complete!</div>
  <div id="mission-toast-body"></div>
</div>

<script>
const PAW_IMG = '/static/images/paw-heart.png';
const PAW_IMG_FILLED = '/static/images/paw-heart-filled.png';

const ME = localStorage.getItem('pawrank_user');
if (!ME) {
  window.location.href = '/';
} else {
  fetch(`/profile/${ME}`)
    .then(res => {
      if (!res.ok) { localStorage.clear(); window.location.href = '/'; }
    })
    .catch(() => { localStorage.clear(); window.location.href = '/'; });
}

document.getElementById('nav-user').textContent = '@' + ME;

const likedPosts = new Set();
let allPosts = [];

function toast(msg) {
  const el = document.getElementById('toast-el');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function showMissionToast(missions, bonus) {
  if (!missions || !missions.length) return;
  const el   = document.getElementById('mission-toast');
  const body = document.getElementById('mission-toast-body');
  body.textContent = missions.join(', ') + ` · +${bonus}pts earned!`;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}

function formatDate(str) {
  const d = new Date(str);
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

function visitProfile(username) {
  location.href = `/profile?u=${username}`;
}

function pawBtn(postId, liked, count) {
  return `<img src="${liked ? PAW_IMG_FILLED : PAW_IMG}"
               class="paw-icon" style="width:22px;height:22px;object-fit:contain"/>
          <span class="like-count" id="like-count-${postId}">${count}</span>`;
}

function renderPosts(posts) {
  const el = document.getElementById('feed-list');
  if (!posts.length) {
    el.innerHTML = `
      <div class="empty-feed">
        <div class="big">🐾</div>
        <p>No posts yet! Be the first to share.</p>
        <button class="submit-btn"
          style="margin-top:16px;width:auto;padding:10px 24px"
          onclick="location.href='/post'">Share Your Pet ➕</button>
      </div>`;
    return;
  }

  const sorted   = [...posts].sort((a,b) => b.likes - a.likes);
  const maxLikes = sorted[0]?.likes || 1;

  el.innerHTML = sorted.map((p, i) => {
    const isLiked = likedPosts.has(p.id);
    const pct     = Math.round((p.likes / maxLikes) * 100);
    const medal   = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`;
    const avatar  = p.pet_image
      ? `<img src="${p.pet_image}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`
      : '🐾';

    return `
    <div class="post-card" id="post-${p.id}">
      <div class="post-rank-badge">${medal}</div>

      <img class="post-image" src="${p.image_url}" alt="pet post"
        onerror="this.style.display='none'"/>

      <div class="post-body">
        <div class="post-header">
          <div class="post-avatar" onclick="visitProfile('${p.username}')"
            style="cursor:pointer">${avatar}</div>
          <div class="post-username" onclick="visitProfile('${p.username}')">
            @${p.username}
          </div>
          <div class="post-date">${formatDate(p.created_at)}</div>
        </div>

        ${p.location ? `<div class="post-location">📍 ${p.location}</div>` : ''}

        <div class="score-bar-wrap">
          <div class="score-bar-top">
            <span class="score-label">Likes</span>
            <span class="score-value">
              <img src="${PAW_IMG}" style="width:14px;height:14px;object-fit:contain;vertical-align:middle"/>
              <span id="score-val-${p.id}">${p.likes}</span>
            </span>
          </div>
          <div class="score-bar">
            <div class="score-bar-fill" style="width:${pct}%"></div>
          </div>
        </div>

        ${p.caption ? `
          <div class="post-caption">
            <strong onclick="visitProfile('${p.username}')"
              style="cursor:pointer">@${p.username}</strong>${p.caption}
          </div>` : ''}

        <div class="post-actions">
          <button class="action-btn ${isLiked ? 'liked' : ''}"
            id="like-btn-${p.id}"
            onclick="handleLike(${p.id})">
            ${pawBtn(p.id, isLiked, p.likes)}
          </button>
          <button class="action-btn" onclick="focusComment(${p.id})">
            💬 <span id="comment-count-${p.id}">0</span>
          </button>
        </div>
      </div>

      <div class="comments-section">
        <span class="view-comments" onclick="toggleComments(${p.id})">
          View comments
        </span>
        <div class="comment-list" id="comment-list-${p.id}" style="display:none"></div>
      </div>

      <div class="comment-input-row">
        <input class="comment-input" id="comment-input-${p.id}"
          placeholder="Add a comment..."
          onkeydown="if(event.key==='Enter') postComment(${p.id})"/>
        <button class="comment-post-btn" onclick="postComment(${p.id})">Post</button>
      </div>
    </div>`;
  }).join('');

  posts.forEach(p => loadCommentCount(p.id));
}

async function loadFeed() {
  const [feedRes, likedRes] = await Promise.all([
    fetch('/posts'),
    fetch(`/liked/${ME}`)
  ]);
  const feedData  = await feedRes.json();
  const likedData = await likedRes.json();

  allPosts = feedData.posts;
  likedData.liked_post_ids.forEach(id => likedPosts.add(id));
  renderPosts(allPosts);
}

async function handleLike(postId) {
  const res  = await fetch(`/like/${postId}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: ME })
  });
  const data = await res.json();
  const btn  = document.getElementById(`like-btn-${postId}`);

  if (data.status === 'liked') {
    likedPosts.add(postId);
    btn.classList.add('liked');
    btn.innerHTML = pawBtn(postId, true, data.likes);
    toast('Liked!');
    if (data.missions_completed?.length) {
      showMissionToast(data.missions_completed, data.bonus_points);
    }
  } else {
    likedPosts.delete(postId);
    btn.classList.remove('liked');
    btn.innerHTML = pawBtn(postId, false, data.likes);
    toast('Unliked');
  }

  const post = allPosts.find(p => p.id === postId);
  if (post) {
    post.likes = data.likes;
    const maxLikes = Math.max(...allPosts.map(p => p.likes), 1);
    const pct  = Math.round((data.likes / maxLikes) * 100);
    const fill = document.querySelector(`#post-${postId} .score-bar-fill`);
    const val  = document.getElementById(`score-val-${postId}`);
    if (fill) fill.style.width = pct + '%';
    if (val)  val.textContent  = data.likes;
  }
}

async function loadCommentCount(postId) {
  const res  = await fetch(`/comments/${postId}`);
  const data = await res.json();
  const el   = document.getElementById(`comment-count-${postId}`);
  if (el) el.textContent = data.comments.length;
  return data.comments;
}

async function toggleComments(postId) {
  const list = document.getElementById(`comment-list-${postId}`);
  if (list.style.display === 'none') {
    const comments = await loadCommentCount(postId);
    list.innerHTML = comments.length
      ? comments.map(c => `
          <div class="comment-item">
            <strong onclick="visitProfile('${c.username}')"
              style="cursor:pointer">@${c.username}</strong>${c.content}
            <span class="comment-time">${formatDate(c.created_at)}</span>
          </div>`).join('')
      : '<div style="font-size:11px;color:#8a7560">No comments yet</div>';
    list.style.display = 'block';
  } else {
    list.style.display = 'none';
  }
}

async function postComment(postId) {
  const input   = document.getElementById(`comment-input-${postId}`);
  const content = input.value.trim();
  if (!content) return;

  const res  = await fetch(`/comment/${postId}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: ME, content })
  });
  const data = await res.json();
  input.value = '';

  const list = document.getElementById(`comment-list-${postId}`);
  list.style.display = 'block';
  list.innerHTML = data.comments.map(c => `
    <div class="comment-item">
      <strong onclick="visitProfile('${c.username}')"
        style="cursor:pointer">@${c.username}</strong>${c.content}
      <span class="comment-time">${formatDate(c.created_at)}</span>
    </div>`).join('');

  const countEl = document.getElementById(`comment-count-${postId}`);
  if (countEl) countEl.textContent = data.comments.length;
  toast('💬 Comment posted!');

  if (data.missions_completed?.length) {
    showMissionToast(data.missions_completed, data.bonus_points);
  }
}

function focusComment(postId) {
  document.getElementById(`comment-input-${postId}`)?.focus();
}

loadFeed();
</script>
</body>
</html>
