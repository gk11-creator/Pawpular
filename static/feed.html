<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PawRank — Community Feed</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/style.css"/>
  <style>
    .feed-layout{
      max-width:600px;
      margin:0 auto;
      padding:20px 16px 60px;
    }
    .theme-bar{
      background:linear-gradient(135deg,#ff6b6b,#ff8e53);
      border-radius:14px;
      padding:14px 20px;
      color:#fff;
      margin-bottom:20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .theme-bar-left .theme-label{
      font-size:10px;font-weight:800;
      letter-spacing:2px;text-transform:uppercase;opacity:.85;
    }
    .theme-bar-left .theme-name{font-size:16px;font-weight:900}
    .theme-bar-right{font-size:28px;opacity:.7}

    /* POST CARD */
    .post-card{
      background:#fff;
      border:1.5px solid var(--border);
      border-radius:16px;
      overflow:hidden;
      margin-bottom:20px;
    }
    .post-header{
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px 16px;
    }
    .post-avatar{
      width:38px;height:38px;
      border-radius:50%;
      background:var(--bg);
      display:flex;align-items:center;justify-content:center;
      font-size:20px;flex-shrink:0;
      overflow:hidden;
    }
    .post-avatar img{width:100%;height:100%;object-fit:cover}
    .post-username{font-size:13px;font-weight:800}
    .post-location{font-size:11px;color:var(--muted)}
    .post-date{font-size:11px;color:var(--muted);margin-left:auto}

    .post-image{
      width:100%;
      aspect-ratio:1/1;
      object-fit:cover;
      display:block;
    }

    .post-actions{
      display:flex;
      align-items:center;
      gap:12px;
      padding:12px 16px 8px;
    }
    .action-btn{
      display:flex;align-items:center;gap:5px;
      background:none;border:none;cursor:pointer;
      font-size:13px;font-weight:800;
      font-family:'Nunito',sans-serif;
      color:var(--text);padding:0;
      transition:transform .1s;
    }
    .action-btn:active{transform:scale(.9)}
    .action-btn.liked{color:var(--brand)}
    .like-count{font-size:13px;font-weight:900}

    .post-caption{
      padding:0 16px 8px;
      font-size:13px;line-height:1.5;
    }
    .post-caption strong{font-weight:800;margin-right:5px}

    /* COMMENTS */
    .comments-section{padding:0 16px 12px}
    .view-comments{
      font-size:12px;color:var(--muted);font-weight:700;
      cursor:pointer;margin-bottom:6px;display:block;
    }
    .comment-list{margin-bottom:6px}
    .comment-item{
      font-size:12px;line-height:1.5;margin-bottom:4px;
    }
    .comment-item strong{font-weight:800;margin-right:4px}
    .comment-time{font-size:10px;color:var(--muted);margin-left:4px}

    .comment-input-row{
      display:flex;align-items:center;gap:8px;
      border-top:1px solid var(--border);
      padding:10px 16px;
    }
    .comment-input{
      flex:1;border:none;outline:none;
      font-size:13px;font-family:'Nunito',sans-serif;
      background:transparent;color:var(--text);
    }
    .comment-input::placeholder{color:var(--muted)}
    .comment-post-btn{
      font-size:12px;font-weight:800;color:var(--brand2);
      background:none;border:none;cursor:pointer;
      font-family:'Nunito',sans-serif;
    }

    /* NAV */
    .bottom-nav{
      position:fixed;bottom:0;left:0;right:0;
      background:#fff;border-top:1.5px solid var(--border);
      display:flex;justify-content:space-around;
      padding:10px 0 14px;z-index:100;
    }
    .bottom-btn{
      display:flex;flex-direction:column;align-items:center;gap:2px;
      background:none;border:none;cursor:pointer;
      font-size:10px;font-weight:700;color:var(--muted);
      font-family:'Nunito',sans-serif;
    }
    .bottom-btn.active{color:var(--brand)}
    .bottom-icon{font-size:22px}

    .empty-feed{
      text-align:center;padding:60px 20px;color:var(--muted);
    }
    .empty-feed .big{font-size:48px;margin-bottom:12px}
    .empty-feed p{font-size:14px;font-weight:700}
  </style>
</head>
<body>

<!-- TOP NAV -->
<nav>
  <div class="logo">Paw<span>Rank</span><small>IU · 2025</small></div>
  <div style="font-size:13px;font-weight:700;color:var(--muted)" id="nav-user"></div>
</nav>

<div class="feed-layout">

  <!-- THEME BAR -->
  <div class="theme-bar">
    <div class="theme-bar-left">
      <div class="theme-label">Theme of the Month</div>
      <div class="theme-name">🦁 Bravest Pet</div>
    </div>
    <div class="theme-bar-right">🏆</div>
  </div>

  <!-- POSTS -->
  <div id="feed-list">
    <div class="empty-feed">
      <div class="big">🐾</div>
      <p>Loading posts...</p>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="bottom-btn active" onclick="location.href='/feed'">
    <span class="bottom-icon">🏠</span>Feed
  </button>
  <button class="bottom-btn" onclick="location.href='/leaderboard'">
    <span class="bottom-icon">🏆</span>Ranking
  </button>
  <button class="bottom-btn" onclick="location.href='/post'">
    <span class="bottom-icon">➕</span>Post
  </button>
  <button class="bottom-btn" onclick="location.href='/profile'">
    <span class="bottom-icon">👤</span>Profile
  </button>
</div>

<div class="toast" id="toast-el"></div>

<script>
// ── Auth check ────────────────────────────────────────────────────────────
const ME = localStorage.getItem('pawrank_user');
if (!ME) window.location.href = '/';
document.getElementById('nav-user').textContent = '@' + ME;

// ── Liked set (session only) ──────────────────────────────────────────────
const likedPosts = new Set();

// ── Toast ─────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast-el');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ── Format date ───────────────────────────────────────────────────────────
function formatDate(str) {
  const d = new Date(str);
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

// ── Render posts ──────────────────────────────────────────────────────────
function renderPosts(posts) {
  const el = document.getElementById('feed-list');
  if (!posts.length) {
    el.innerHTML = `
      <div class="empty-feed">
        <div class="big">🐾</div>
        <p>No posts yet! Be the first to share.</p>
        <button class="submit-btn" style="margin-top:16px;width:auto;padding:10px 24px"
          onclick="location.href='/post'">Share Your Pet ➕</button>
      </div>`;
    return;
  }

  el.innerHTML = posts.map(p => {
    const isLiked = likedPosts.has(p.id);
    return `
    <div class="post-card" id="post-${p.id}">

      <div class="post-header">
        <div class="post-avatar">
          ${p.pet_image ? `<img src="${p.pet_image}"/>` : '🐾'}
        </div>
        <div>
          <div class="post-username">@${p.username}</div>
          ${p.location ? `<div class="post-location">📍 ${p.location}</div>` : ''}
        </div>
        <div class="post-date">${formatDate(p.created_at)}</div>
      </div>

      <img class="post-image" src="${p.image_url}" alt="pet post"
        onerror="this.style.display='none'"/>

      <div class="post-actions">
        <button class="action-btn ${isLiked ? 'liked' : ''}"
          id="like-btn-${p.id}"
          onclick="handleLike(${p.id})">
          ${isLiked ? '❤️' : '🤍'}
          <span class="like-count" id="like-count-${p.id}">${p.likes}</span>
        </button>
        <button class="action-btn" onclick="focusComment(${p.id})">
          💬 <span id="comment-count-${p.id}">0</span>
        </button>
      </div>

      ${p.caption ? `
        <div class="post-caption">
          <strong>@${p.username}</strong>${p.caption}
        </div>` : ''}

      <div class="comments-section">
        <span class="view-comments" onclick="toggleComments(${p.id})">
          View comments
        </span>
        <div class="comment-list" id="comment-list-${p.id}" style="display:none"></div>
      </div>

      <div class="comment-input-row">
        <input class="comment-input" id="comment-input-${p.id}"
          placeholder="Add a comment..."
          onkeydown="if(event.key==='Enter') postComment(${p.id})"/>
        <button class="comment-post-btn" onclick="postComment(${p.id})">Post</button>
      </div>

    </div>`;
  }).join('');

  // Load comment counts
  posts.forEach(p => loadCommentCount(p.id));
}

// ── Load feed ─────────────────────────────────────────────────────────────
async function loadFeed() {
  const res  = await fetch('/posts');
  const data = await res.json();
  renderPosts(data.posts);
}

// ── Like ──────────────────────────────────────────────────────────────────
async function handleLike(postId) {
  const res  = await fetch(`/like/${postId}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: ME })
  });
  const data = await res.json();

  const btn   = document.getElementById(`like-btn-${postId}`);
  const count = document.getElementById(`like-count-${postId}`);

  if (data.status === 'liked') {
    likedPosts.add(postId);
    btn.classList.add('liked');
    btn.innerHTML = `❤️ <span class="like-count" id="like-count-${postId}">${data.likes}</span>`;
    toast('❤️ Liked!');
  } else {
    likedPosts.delete(postId);
    btn.classList.remove('liked');
    btn.innerHTML = `🤍 <span class="like-count" id="like-count-${postId}">${data.likes}</span>`;
    toast('💔 Unliked');
  }
}

// ── Comments ──────────────────────────────────────────────────────────────
async function loadCommentCount(postId) {
  const res  = await fetch(`/comments/${postId}`);
  const data = await res.json();
  const el   = document.getElementById(`comment-count-${postId}`);
  if (el) el.textContent = data.comments.length;
  return data.comments;
}

async function toggleComments(postId) {
  const list = document.getElementById(`comment-list-${postId}`);
  if (list.style.display === 'none') {
    const comments = await loadCommentCount(postId);
    list.innerHTML = comments.length
      ? comments.map(c => `
          <div class="comment-item">
            <strong>@${c.username}</strong>${c.content}
            <span class="comment-time">${formatDate(c.created_at)}</span>
          </div>`).join('')
      : '<div style="font-size:12px;color:var(--muted)">No comments yet</div>';
    list.style.display = 'block';
  } else {
    list.style.display = 'none';
  }
}

async function postComment(postId) {
  const input   = document.getElementById(`comment-input-${postId}`);
  const content = input.value.trim();
  if (!content) return;

  const res  = await fetch(`/comment/${postId}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: ME, content })
  });
  const data = await res.json();
  input.value = '';

  const list = document.getElementById(`comment-list-${postId}`);
  list.style.display = 'block';
  list.innerHTML = data.comments.map(c => `
    <div class="comment-item">
      <strong>@${c.username}</strong>${c.content}
      <span class="comment-time">${formatDate(c.created_at)}</span>
    </div>`).join('');

  const countEl = document.getElementById(`comment-count-${postId}`);
  if (countEl) countEl.textContent = data.comments.length;
  toast('💬 Comment posted!');
}

function focusComment(postId) {
  document.getElementById(`comment-input-${postId}`)?.focus();
}

// ── Init ──────────────────────────────────────────────────────────────────
loadFeed();
</script>
</body>
</html>
