openapi: 3.0.3
info:
  title: Pawdium API
  description: >
    A competitive pet leaderboard platform.
    Users upload pet photos monthly, community likes drive rankings.
    Features viral scoring, daily missions, and real-time leaderboard updates.
  version: 3.0.0

servers:
  - url: http://localhost:8000
    description: Local development server

tags:
  - name: Auth
    description: User registration and login
  - name: Posts
    description: Pet photo posts and likes
  - name: Leaderboard
    description: Rankings and leaderboard
  - name: Missions
    description: Daily missions and bonus points
  - name: Statistics
    description: Analytics and performance metrics

paths:

  /add:
    post:
      tags: [Leaderboard]
      summary: Add or update a leaderboard entry
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                username: { type: string }
                pet_name: { type: string }
                pet_type: { type: string }
                score:    { type: number }
                theme:    { type: string }
            example:
              username: "jiwoo_kim"
              pet_name: "Bori"
              pet_type: "Dog"
              score: 83
              theme: "Bravest Pet"
      responses:
        '200':
          description: Entry added or updated

  /remove:
    delete:
      tags: [Leaderboard]
      summary: Remove a user and all their posts from the leaderboard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveEntry'
            example:
              username: "jiwoo_kim"
      responses:
        '200':
          description: Entry removed
        '404':
          description: User not found

  /leaderboard:
    get:
      tags: [Leaderboard]
      summary: Get top 10 leaderboard positions (HTML page)
      responses:
        '200':
          description: Leaderboard HTML page

  /api/leaderboard:
    get:
      tags: [Leaderboard]
      summary: Get leaderboard as JSON — ranked by viral score + bonus points
      description: >
        Returns the best post per user (most liked), ranked by
        viral_score + bonus_points. Includes medal, badges, and score breakdown.
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 200 }
      responses:
        '200':
          description: Leaderboard JSON data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderboardResponse'

  /info:
    get:
      tags: [Statistics]
      summary: Get quantitative statistics for all posts
      description: >
        Returns mean, median, min, max, Q1, Q3, IQR, avg_viral, max_viral
        based on all post likes and viral scores.
      responses:
        '200':
          description: Statistics object
          content:
            application/json:
              example:
                total_posts: 10
                statistics:
                  mean: 4.5
                  median: 4.0
                  min: 1
                  max: 12
                  q1: 2.0
                  q3: 7.5
                  iqr: 5.5
                  avg_viral: 5.2
                  max_viral: 12.0
        '404':
          description: No posts found

  /performance:
    get:
      tags: [Statistics]
      summary: Get average execution time per endpoint (ms)
      responses:
        '200':
          description: Endpoint performance metrics
          content:
            application/json:
              example:
                endpoint_performance:
                  add:         { calls: 5, avg_ms: 1.2, min_ms: 0.8, max_ms: 2.1 }
                  remove:      { calls: 1, avg_ms: 0.9, min_ms: 0.9, max_ms: 0.9 }
                  leaderboard: { calls: 10, avg_ms: 3.4, min_ms: 2.1, max_ms: 5.2 }
                  info:        { calls: 3, avg_ms: 1.1, min_ms: 0.9, max_ms: 1.4 }
                  performance: { calls: 2, avg_ms: 0.5, min_ms: 0.4, max_ms: 0.6 }

  /history:
    get:
      tags: [Statistics]
      summary: Get score submission history with timestamps
      description: >
        Returns all like events with timestamps. Supports filtering by username
        and date range. Useful for tracking score changes over time.
      parameters:
        - name: username
          in: query
          required: false
          schema: { type: string }
          description: Filter by specific username
        - name: start
          in: query
          required: false
          schema: { type: string, format: date }
          description: Start date (YYYY-MM-DD)
          example: "2025-04-18"
        - name: end
          in: query
          required: false
          schema: { type: string, format: date }
          description: End date (YYYY-MM-DD)
          example: "2025-04-18"
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 50, minimum: 1, maximum: 500 }
      responses:
        '200':
          description: History of score submissions
          content:
            application/json:
              example:
                total: 3
                filters:
                  username: "jiwoo_kim"
                  start: "2025-04-18"
                  end: "2025-04-18"
                history:
                  - username: "jiwoo_kim"
                    post_id: 1
                    timestamp: "2025-04-18 10:23:37"
                    likes: 5
                    viral_score: 7.5
                    caption: "My brave dog!"

  /register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthBody'
            example:
              username: "jiwoo_kim"
              password: "password123"
      responses:
        '200':
          description: User registered
        '400':
          description: Username already exists

  /login:
    post:
      tags: [Auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthBody'
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid credentials

  /upload:
    post:
      tags: [Posts]
      summary: Upload a pet post with image (auto-theme Bravest Pet)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                username: { type: string }
                caption:  { type: string }
                location: { type: string }
                image:    { type: string, format: binary }
      responses:
        '200':
          description: Post uploaded successfully

  /posts:
    get:
      tags: [Posts]
      summary: Get all posts optionally filtered by username
      parameters:
        - name: username
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: List of posts

  /like/{post_id}:
    post:
      tags: [Posts]
      summary: Like or unlike a post — toggles, 1 like per user
      parameters:
        - name: post_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username: { type: string }
      responses:
        '200':
          description: Liked or unliked with viral score and mission updates

  /liked/{username}:
    get:
      tags: [Posts]
      summary: Get all post IDs liked by a user
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: List of liked post IDs

  /comment/{post_id}:
    post:
      tags: [Posts]
      summary: Add a comment to a post
      parameters:
        - name: post_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username: { type: string }
                content:  { type: string }
      responses:
        '200':
          description: Comment added

  /comments/{post_id}:
    get:
      tags: [Posts]
      summary: Get all comments for a post
      parameters:
        - name: post_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: List of comments

  /post/{post_id}:
    delete:
      tags: [Posts]
      summary: Delete a post (owner only)
      parameters:
        - name: post_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username: { type: string }
      responses:
        '200':
          description: Post deleted
        '403':
          description: Not your post
        '404':
          description: Post not found

  /missions:
    get:
      tags: [Missions]
      summary: Get today's missions
      responses:
        '200':
          description: List of daily missions

  /missions/{username}:
    get:
      tags: [Missions]
      summary: Get today's missions with completion status for a user
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Missions with completed flag

  /profile/{username}:
    get:
      tags: [Auth]
      summary: Get user profile
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: User profile data
        '404':
          description: User not found
    put:
      tags: [Auth]
      summary: Update user profile
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfile'
      responses:
        '200':
          description: Profile updated

components:
  schemas:

    AuthBody:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }

    RemoveEntry:
      type: object
      required: [username]
      properties:
        username: { type: string }

    UpdateProfile:
      type: object
      properties:
        pet_name: { type: string }
        pet_type: { type: string }
        pet_year: { type: integer }
        pet_bio:  { type: string }

    LeaderboardResponse:
      type: object
      properties:
        total_entries: { type: integer }
        leaderboard:
          type: array
          items:
            type: object
            properties:
              rank:         { type: integer }
              medal:        { type: string }
              username:     { type: string }
              pet_name:     { type: string }
              pet_type:     { type: string }
              total_likes:  { type: integer }
              viral_score:  { type: number }
              bonus_points: { type: integer }
              total_score:  { type: number }
              badge:        { type: string }